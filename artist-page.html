<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artist Page | MusicBusiness Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="artist-body">
    <header class="site-header">
      <a class="brand" href="/home" aria-label="MusicBusiness Arena home">
        <img data-logo src="Mba Logos/MusicBusiness Logo.png" alt="MusicBusiness Arena logo" />
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/home">Home</a>
        <a href="/music">Music</a>
        <a href="/video">Video</a>
        <a href="/upload">Upload</a>
      </nav>
    </header>

    <main>
      <section class="artist-track-section music-showcase" aria-label="Artist music">
        <div class="artist-track-list" id="artistTrackList"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-socials" aria-label="Social media links">
          <a href="#" aria-label="X"><img src="https://cdn.simpleicons.org/x/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Facebook"><img src="https://cdn.simpleicons.org/facebook/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Instagram"><img src="https://cdn.simpleicons.org/instagram/FFFFFF" alt="" /></a>
          <a href="#" aria-label="YouTube"><img src="https://cdn.simpleicons.org/youtube/FFFFFF" alt="" /></a>
          <a href="#" aria-label="TikTok"><img src="https://cdn.simpleicons.org/tiktok/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Twitch"><img src="https://cdn.simpleicons.org/twitch/FFFFFF" alt="" /></a>
        </div>
        <p class="footer-copy">© 2026 MusicBusiness Arena. All rights reserved.</p>
      </div>
    </footer>

    <script src="mba-storage.js"></script>
    <script src="platform-config.js"></script>
    <script src="artist-page.js"></script>
  </body>
</html>
