<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artist Page | MusicBusiness Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="artist-body">
    <header class="site-header">
      <a class="brand" href="/home" aria-label="MusicBusiness Arena home">
        <img data-logo src="Mba Logos/MusicBusiness Logo.png" alt="MusicBusiness Arena logo" />
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/home">Home</a>
        <a href="/music">Music</a>
        <a href="/video">Video</a>
        <a href="/upload">Upload</a>
      </nav>
    </header>

    <main>
      <section class="artist-hero">
        <div class="artist-cover-glow" aria-hidden="true"></div>
        <div class="artist-profile-card">
          <img id="artistPhoto" class="artist-photo" src="Mba Logos/MusicBusiness Logo.png" alt="" />
          <div class="artist-profile-main">
            <p class="eyebrow">Artist profile</p>
            <h1 id="artistName">Artist name</h1>
            <p id="artistBio">Artist biography will appear here after the artist saves a profile.</p>
            <div class="artist-stats" aria-label="Artist stats">
              <div><strong id="artistReleaseCount">0</strong><span>total song play</span></div>
              <div><strong id="artistDownloadCount">0</strong><span>downloads</span></div>
              <div><strong id="artistEarningsCount">0</strong><span>followers</span></div>
            </div>
            <div class="icon-links" id="socialLinks"></div>
          </div>
        </div>
        <nav class="artist-tabs" aria-label="Artist page sections">
          <a class="is-current" href="/listen">Songs</a>
          <a href="/listen">Albums</a>
          <a href="/listen">Streaming links</a>
          <a href="/listen">Support</a>
        </nav>
      </section>

      <section class="artist-track-section" aria-labelledby="topTracksTitle">
        <div class="artist-track-heading">
          <h2 id="topTracksTitle">Top tracks</h2>
          <div class="track-tabs" aria-label="Track filters">
            <button class="is-current" type="button">Top Tracks</button>
            <button type="button">Recent Tracks</button>
          </div>
        </div>
        <div class="artist-track-list" id="artistTrackList"></div>
        <section class="artist-more-section" aria-labelledby="artistMoreTitle">
          <div class="more-heading">
            <h2 id="artistMoreTitle">Artist picks</h2>
            <a href="/listen">View all</a>
          </div>
          <div class="artist-more-circle-grid" id="artistMoreList"></div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-socials" aria-label="Social media links">
          <a href="#" aria-label="X"><img src="https://cdn.simpleicons.org/x/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Facebook"><img src="https://cdn.simpleicons.org/facebook/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Instagram"><img src="https://cdn.simpleicons.org/instagram/FFFFFF" alt="" /></a>
          <a href="#" aria-label="YouTube"><img src="https://cdn.simpleicons.org/youtube/FFFFFF" alt="" /></a>
          <a href="#" aria-label="TikTok"><img src="https://cdn.simpleicons.org/tiktok/FFFFFF" alt="" /></a>
          <a href="#" aria-label="Twitch"><img src="https://cdn.simpleicons.org/twitch/FFFFFF" alt="" /></a>
        </div>
        <p class="footer-copy">© 2026 MusicBusiness Arena. All rights reserved.</p>
      </div>
    </footer>

    <script src="mba-storage.js"></script>
    <script src="platform-config.js"></script>
    <script src="artist-page.js"></script>
  </body>
</html>
