services:
  - type: web
    name: musicbusinessarena
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    domains:
      - musicbusinessarena.com
      - www.musicbusinessarena.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: musicbusinessarena
      - key: MONGODB_COLLECTION
        value: siteStore
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PUBLIC_SITE_URL
        value: https://musicbusinessarena.com
    disk:
      name: musicbusinessarena-uploads
      mountPath: /var/data
      sizeGB: 10
